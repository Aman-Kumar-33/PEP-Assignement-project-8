<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | BookIt Online</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* This ensures the sidebar and main area are perfectly split */
      body {
        display: flex;
        min-height: 100vh;
        background-color: #f8fafc;
        margin: 0;
      }

      .sidebar {
        width: 280px;
        background: #1e293b;
        color: white;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
      }

      .main-content {
        margin-left: 280px;
        flex: 1;
        padding: 40px;
      }

      .stats-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
      }

      .stat-card h4 {
        color: #64748b;
        margin: 0;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .stat-card p {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 10px 0 0;
        color: #1e293b;
      }

      .booking-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 25px;
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 100px 20px;
        background: white;
        border-radius: 16px;
        border: 2px dashed #e2e8f0;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div
        class="logo"
        style="
          font-size: 2rem;
          margin-bottom: 50px;
          font-weight: 800;
          color: #6366f1;
        "
      >
        Book<span style="color: white">It</span>
      </div>
      <nav style="flex: 1">
        <ul style="list-style: none; padding: 0">
          <li style="margin-bottom: 15px">
            <a
              href="index.html"
              style="
                color: #94a3b8;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px;
                border-radius: 8px;
              "
            >
              🏠 Explore Services
            </a>
          </li>
          <li style="margin-bottom: 15px">
            <a
              href="dashboard.html"
              style="
                color: white;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px;
                background: #334155;
                border-radius: 8px;
                font-weight: 600;
              "
            >
              📊 My Bookings
            </a>
          </li>
        </ul>
      </nav>
      <button
        onclick="logout()"
        class="btn-outline"
        style="border-color: #475569; color: black; cursor: pointer"
      >
        Logout
      </button>
    </aside>

    <main class="main-content">
      <header style="margin-bottom: 40px">
        <h1 style="font-size: 2rem; color: #0f172a; margin: 0">
          Welcome Back!
        </h1>
        <p style="color: #64748b; margin-top: 5px">
          Manage your appointments and schedule.
        </p>
      </header>

      <div class="stats-container">
        <div class="stat-card">
          <h4>Total Bookings</h4>
          <p id="total-count">0</p>
        </div>
        <div class="stat-card">
          <h4>Upcoming Sessions</h4>
          <p id="upcoming-count" style="color: #6366f1">0</p>
        </div>
      </div>

      <h3 style="margin-bottom: 20px; color: #1e293b">Recent Bookings</h3>

      <div id="bookings-list" class="booking-grid">
        <div class="empty-state">
          <p style="font-size: 1.2rem; color: #94a3b8; margin-bottom: 20px">
            No bookings found yet.
          </p>
          <a href="index.html" class="btn-primary">Find a Service</a>
        </div>
      </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script>
      function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
