<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BookIt</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .auth-container {
        display: flex;
        min-height: 100vh;
        flex-direction: row-reverse;
      }
      .auth-banner {
        flex: 1;
        background:
          linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
          url("https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80");
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
        color: white;
      }
      .auth-form-side {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        padding: 40px;
      }
      .form-box {
        width: 100%;
        max-width: 360px;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-banner">
        <h1 style="font-size: 3rem; margin-bottom: 20px">Welcome back.</h1>
        <p style="font-size: 1.1rem; opacity: 0.8">
          Manage your appointments and grow your business with our specialized
          tools.
        </p>
      </div>
      <div class="auth-form-side">
        <div class="form-box">
          <div class="logo" style="margin-bottom: 40px">
            Book<span>It</span>
          </div>
          <h2 style="margin-bottom: 10px">Login</h2>
          <p style="color: #666; margin-bottom: 30px">
            Enter your credentials to access your dashboard.
          </p>

          <form id="login-form">
            <div class="input-group">
              <label>Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="name@company.com"
                required
              />
            </div>
            <div class="input-group">
              <div style="display: flex; justify-content: space-between">
                <label>Password</label>
                <a
                  href="#"
                  style="
                    font-size: 0.8rem;
                    color: var(--primary);
                    text-decoration: none;
                  "
                  >Forgot?</a
                >
              </div>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>
            <button
              type="submit"
              id="login-btn"
              class="btn-primary"
              style="width: 100%; padding: 14px"
            >
              Sign In
            </button>
          </form>
          <p style="margin-top: 25px; text-align: center; font-size: 0.9rem">
            Don't have an account?
            <a
              href="register.html"
              style="
                color: var(--primary);
                font-weight: 600;
                text-decoration: none;
              "
              >Sign up for free</a
            >
          </p>
        </div>
      </div>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
