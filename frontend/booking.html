<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Checkout | BookIt</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* Force a clean, centered layout without sidebars */
      body {
        background-color: #f1f5f9 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
        margin: 0 !important;
        flex-direction: column !important;
      }

      .checkout-container {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        width: 100%;
        max-width: 480px;
        border: 1px solid #e2e8f0;
      }

      .checkout-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .checkout-header .logo {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .service-highlight {
        background: #f8fafc;
        border: 1px dashed #cbd5e1;
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 30px;
        text-align: center;
      }

      .input-block {
        margin-bottom: 20px;
      }

      .input-block label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        color: #475569;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input[type="datetime-local"] {
        width: 100%;
        padding: 14px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
      }

      input[type="datetime-local"]:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }

      .back-link {
        margin-top: 20px;
        display: block;
        text-align: center;
        color: #64748b;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .back-link:hover {
        color: #1e293b;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="checkout-container">
      <div class="checkout-header">
        <div class="logo">Book<span>It</span></div>
        <h2 style="font-weight: 800; color: #1e293b">Confirm Booking</h2>
      </div>

      <div class="service-highlight">
        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px">
          You're booking
        </p>
        <h3 id="display-title" style="color: #4f46e5; margin: 0">
          Service Appointment
        </h3>
      </div>

      <form id="booking-form">
        <div class="input-block">
          <label>Arrival Time</label>
          <input type="datetime-local" id="start_time" required />
        </div>

        <div class="input-block">
          <label>Departure Time</label>
          <input type="datetime-local" id="end_time" required />
        </div>

        <button
          type="submit"
          class="btn-primary"
          style="
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 12px;
            margin-top: 10px;
          "
        >
          Complete Reservation
        </button>
      </form>

      <a href="index.html" class="back-link">← Cancel and return home</a>
    </div>

    <script src="js/booking.js"></script>
  </body>
</html>
