<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join BookIt - Create Account</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .auth-container {
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }
      .auth-banner {
        flex: 1;
        background:
          linear-gradient(rgba(79, 70, 229, 0.8), rgba(79, 70, 229, 0.8)),
          url("https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&q=80");
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
        color: white;
      }
      .auth-form-side {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        padding: 40px;
      }
      .form-box {
        width: 100%;
        max-width: 400px;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9rem;
      }
      select {
        background-color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-banner">
        <h1 style="font-size: 3.5rem; margin-bottom: 20px">Grow with us.</h1>
        <p style="font-size: 1.2rem; opacity: 0.9">
          Whether you are looking for a service or offering your expertise, you
          are in the right place.
        </p>
      </div>
      <div class="auth-form-side">
        <div class="form-box">
          <div class="logo" style="margin-bottom: 40px">
            Book<span>It</span>
          </div>
          <h2 style="margin-bottom: 10px">Create your account</h2>
          <p style="color: #666; margin-bottom: 30px">
            Join thousands of professionals and clients today.
          </p>

          <form id="register-form">
            <div class="input-group">
              <label>Full Name</label>
              <input
                type="text"
                id="full_name"
                placeholder="e.g. John Doe"
                required
              />
            </div>
            <div class="input-group">
              <label>Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="name@company.com"
                required
              />
            </div>
            <div class="input-group">
              <label>I want to...</label>
              <select id="role" required>
                <option value="user">Book Services (Client)</option>
                <option value="provider">Offer Services (Provider)</option>
              </select>
            </div>
            <div class="input-group">
              <label>Password</label>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>
            <button
              type="submit"
              class="btn-primary"
              style="width: 100%; padding: 14px"
            >
              Create Account
            </button>
          </form>
          <p style="margin-top: 25px; text-align: center; font-size: 0.9rem">
            Already have an account?
            <a
              href="login.html"
              style="
                color: var(--primary);
                font-weight: 600;
                text-decoration: none;
              "
              >Log in</a
            >
          </p>
        </div>
      </div>
    </div>
    <script src="js/auth.js"></script>
  </body>
</html>
